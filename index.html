<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYMASTER — Atajos de Teclado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800;12..96,900&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">

</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo-area">
      <div class="logo-row">
        <div class="logo-icon">⌘</div>
        <div class="logo-text"><h1>KEYMASTER</h1><p>MASTER EDITION v2.0</p></div>
      </div>
      <div class="stats-row">
        <div class="stat"><span class="stat-num" id="stat-programs">0</span><span class="stat-label">PROGRAMAS</span></div>
        <div class="stat"><span class="stat-num" id="stat-shortcuts">0</span><span class="stat-label">ATAJOS</span></div>
      </div>
    </div>
    <div class="nav-area">
        <div class="nav-label">MENÚ</div>
        <button class="nav-btn active" id="btn-home" onclick="goHome()">
          <span class="nav-icon">🏠</span><span>Inicio</span>
        </button>
        <div class="nav-label">CATEGORÍAS</div>
        <div id="nav-list"></div>
      </div>
      <div class="sidebar-footer">
        <div class="nav-label">SÚSCRÍBETE</div>
        <div class="newsletter">
          <input type="email" placeholder="Email para trucos..." id="news-email">
          <button onclick="alert('¡Gracias! Te avisaremos de nuevos atajos.')">OK</button>
        </div>
      </div>
    </aside>

  <main id="main">
    <header id="header">
      <button id="mobile-toggle" onclick="toggleSidebar()" title="Menú" aria-label="Abrir menú">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="2" y1="4.5" x2="16" y2="4.5"/>
          <line x1="2" y1="9" x2="16" y2="9"/>
          <line x1="2" y1="13.5" x2="16" y2="13.5"/>
        </svg>
      </button>
      <button id="btn-home" onclick="goHome()" title="Inicio (H)" aria-label="Ir a inicio">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 8L8 2L14 8V14H10V10H6V14H2V8Z"/>
        </svg>
      </button>
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <circle cx="6" cy="6" r="4"/>
            <line x1="9.5" y1="9.5" x2="13" y2="13"/>
          </svg>
        </span>
        <input type="text" id="search" placeholder="Buscar programa o función... (Ctrl+K)" oninput="renderGrid(); showSuggestions()" autocomplete="off">
        <div id="suggestions" class="suggestions"></div>
      </div>
      <div class="header-right">
        <button class="view-btn active" id="btn-grid" onclick="setView('grid')" title="Cuadrícula">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <rect x="1" y="1" width="6" height="6" rx="1.5"/>
            <rect x="9" y="1" width="6" height="6" rx="1.5"/>
            <rect x="1" y="9" width="6" height="6" rx="1.5"/>
            <rect x="9" y="9" width="6" height="6" rx="1.5"/>
          </svg>
        </button>
        <button class="view-btn" id="btn-list" onclick="setView('list')" title="Lista">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <line x1="5" y1="4" x2="14" y2="4"/>
            <line x1="5" y1="8" x2="14" y2="8"/>
            <line x1="5" y1="12" x2="14" y2="12"/>
            <circle cx="2" cy="4" r="1" fill="currentColor" stroke="none"/>
            <circle cx="2" cy="8" r="1" fill="currentColor" stroke="none"/>
            <circle cx="2" cy="12" r="1" fill="currentColor" stroke="none"/>
          </svg>
        </button>
      </div>
    </header>
    <div id="content">
      <div class="content-header">
        <div class="eyebrow" id="eyebrow-text">LISTADO COMPLETO</div>
        <h2 id="category-title">Todos los Programas</h2>
        <div class="result-count" id="result-count"></div>
      </div>
      <div id="grid"></div>
      <button id="back-to-top" onclick="scrollToTop()" title="Volver arriba">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13l-8-8-8 8"/>
        </svg>
      </button>
    </div>
  </main>
</div>
<div id="overlay" onclick="closeSidebar()"></div>
<div id="kbd-hint" class="kbd-hint">
  <button class="kbd-hint-close" onclick="toggleKbdHint()">×</button>
  <h4>ATAJOS DEL SITIO</h4>
  <div class="kbd-hint-row"><span>Buscar</span><kbd>/</kbd> <kbd>Ctrl+K</kbd></div>
  <div class="kbd-hint-row"><span>Inicio</span><kbd>H</kbd></div>
  <div class="kbd-hint-row"><span>Volver arriba</span><kbd>T</kbd></div>
  <div class="kbd-hint-row"><span>Vista cuadrícula</span><kbd>G</kbd></div>
  <div class="kbd-hint-row"><span>Vista lista</span><kbd>L</kbd></div>
  <div class="kbd-hint-row"><span>Menú lateral</span><kbd>S</kbd></div>
  <div class="kbd-hint-row"><span>Categorías</span><kbd>1-9</kbd></div>
  <div class="kbd-hint-row"><span>Cerrar/Limpiar</span><kbd>Esc</kbd></div>
  <div class="kbd-hint-row"><span>Mostrar ayuda</span><kbd>?</kbd></div>
</div>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
